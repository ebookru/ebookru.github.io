<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Найти мою покупку | Smart Things Bookstore</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand py-3">
  <div class="container d-flex justify-content-between align-items-center">
    <a href="index.html" class="text-decoration-none">
      <span class="brand-name">Smart Things Bookstore</span>
      <span class="brand-tagline">готовые базы знаний для тех, кто идёт вперёд</span>
    </a>
  </div>
</nav>

<main>
<div class="container" style="max-width:560px;margin:60px auto;">
  <h1 style="font-size:1.6em;margin-bottom:12px;">Найти мою покупку</h1>
  <p style="color:var(--text-muted);margin-bottom:28px;">Если вы оплатили архив криптовалютой, но не получили письмо — введите email, который указывали при оплате, и выберите архив.</p>

  <form id="find-form">
    <div class="mb-3">
      <label class="form-label" for="email">Email при оплате</label>
      <input type="email" class="form-control" id="email" required placeholder="you@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label" for="product">Архив</label>
      <select class="form-select" id="product" required>
        <option value="ai">Статьи об Искусственном Интеллекте</option>
        <option value="trading">Книги и материалы для Трейдинга</option>
        <option value="programmers">Книги, обучающие материалы для Программистов</option>
      </select>
    </div>
    <button type="submit" class="btn btn-brand" style="width:100%;">Проверить</button>
  </form>

  <div id="result" style="margin-top:24px;"></div>
</div>
</main>

<script>
  // TODO: замените на реальный адрес вашего Cloudflare Worker после деплоя
  const WORKER_ORIGIN = 'https://smart-things-payments.ebookru.workers.dev';

  const form = document.getElementById('find-form');
  const resultEl = document.getElementById('result');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const product = document.getElementById('product').value;
    resultEl.innerHTML = '<p style="color:var(--text-muted);">Проверяем…</p>';

    try {
      const resp = await fetch(`${WORKER_ORIGIN}/api/find-order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, product }),
      });
      const data = await resp.json();

      if (data.status === 'delivered' && data.download_url) {
        resultEl.innerHTML = `<div class="buy-note" style="color:#2e7d32;">Оплата подтверждена! <a href="${data.download_url}">Скачать архив</a></div>`;
      } else if (data.status === 'delivered') {
        resultEl.innerHTML = `<div class="buy-note" style="color:#2e7d32;">Оплата подтверждена, новая ссылка отправлена на почту.</div>`;
      } else if (data.status === 'pending') {
        resultEl.innerHTML = `<div class="buy-note">Платёж пока не подтверждён сетью. Обычно это занимает от нескольких минут до часа — попробуйте проверить позже.</div>`;
      } else {
        resultEl.innerHTML = `<div class="buy-note">Заказ с таким email и архивом не найден. Проверьте, тот ли email указывали при оплате, либо напишите нам в поддержку.</div>`;
      }
    } catch (err) {
      resultEl.innerHTML = `<div class="buy-note">Ошибка проверки. Попробуйте ещё раз чуть позже.</div>`;
    }
  });
</script>
</body>
</html>
